<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Top-Scored Conference Paper Browser</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, #d1fae5 0%, transparent 35%),
        radial-gradient(circle at 90% 0%, #e0f2fe 0%, transparent 35%),
        var(--bg);
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
    }
    .sub {
      margin: 0 0 16px;
      color: var(--muted);
    }
    .controls {
      position: sticky;
      top: 0;
      background: rgba(246, 248, 251, 0.9);
      backdrop-filter: blur(6px);
      padding: 10px 0 14px;
      border-bottom: 1px solid var(--border);
      z-index: 2;
      margin-bottom: 12px;
    }
    input[type="text"], select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      padding: 10px 12px;
      outline: none;
      background: #fff;
    }
    input[type="text"]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }
    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .list {
      display: grid;
      gap: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 3px 14px rgba(17, 24, 39, 0.06);
    }
    .card h3 {
      margin: 0 0 6px;
      font-size: 1.05rem;
      line-height: 1.3;
    }
    .row {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 2px 0;
      word-break: break-word;
    }
    .score {
      display: inline-block;
      font-weight: 600;
      color: var(--accent);
    }
    .abstract-wrap {
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fafafa;
      padding: 8px 10px;
    }
    .abstract-wrap > summary {
      cursor: pointer;
      color: #111827;
      font-size: 0.92rem;
      font-weight: 600;
      list-style: none;
    }
    .abstract-wrap > summary::-webkit-details-marker { display: none; }
    .abstract {
      margin: 8px 0 2px;
      color: #374151;
      line-height: 1.4;
      font-size: 0.94rem;
    }
    .link {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.9rem;
      color: #1d4ed8;
      text-decoration: none;
    }
    .link:hover { text-decoration: underline; }
    .empty, .loading {
      text-align: center;
      color: var(--muted);
      padding: 18px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Top-Scored Conference Papers</h1>
    <p class="sub">Sorted by average official-review rating (highest first).</p>

    <div class="controls">
      <select id="conferenceSelect">
        <option value="neurips_2025_top25.json">NeurIPS 2025</option>
        <option value="neurips_2024_top25.json">NeurIPS 2024</option>
        <option value="iclr_2025_top25.json">ICLR 2025</option>
        <option value="iclr_2026_top25.json">ICLR 2026</option>
      </select>
      <input id="instituteFilter" type="text" placeholder="Filter primary institute (keyword, e.g. mit, stanford, cmu)" />
      <input id="titleFilter" type="text" placeholder="Filter paper title (keyword)" style="margin-top: 8px;" />
      <div id="meta" class="meta">Loading data...</div>
    </div>

    <div id="paperList" class="list"></div>
    <div id="empty" class="empty" hidden>No papers match this filter.</div>
    <div id="loading" class="loading" hidden>Loading more...</div>
    <div id="sentinel"></div>
  </div>

  <script>
    const PAGE_SIZE = 30;
    let allPapers = [];
    let filtered = [];
    let visibleCount = 0;
    let loading = false;

    const elList = document.getElementById("paperList");
    const elMeta = document.getElementById("meta");
    const elConference = document.getElementById("conferenceSelect");
    const elFilter = document.getElementById("instituteFilter");
    const elTitleFilter = document.getElementById("titleFilter");
    const elEmpty = document.getElementById("empty");
    const elLoading = document.getElementById("loading");
    const sentinel = document.getElementById("sentinel");

    function normalize(value) {
      return (value || "").toString().trim().toLowerCase();
    }

    function paperCard(paper) {
      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `
        <h3>${escapeHtml(paper.title || "Untitled")}</h3>
        <div class="row"><span class="score">Avg score: ${paper.avg_score}</span></div>
        <div class="row"><strong>Primary institute:</strong> ${escapeHtml(paper.primary_institute || "Unknown")}</div>
        <div class="row"><strong>Authors:</strong> ${escapeHtml((paper.authors || []).join(", "))}</div>
        <details class="abstract-wrap">
          <summary>Show abstract</summary>
          <p class="abstract">${escapeHtml(paper.abstract || "No abstract available.")}</p>
        </details>
        <a class="link" href="${paper.url}" target="_blank" rel="noopener noreferrer">OpenReview page</a>
      `;
      return card;
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function updateMeta() {
      const selected = elConference.options[elConference.selectedIndex]?.text || "";
      elMeta.textContent = `${selected}: showing ${Math.min(visibleCount, filtered.length)} of ${filtered.length} matched papers (${allPapers.length} total).`;
    }

    function renderNextPage() {
      if (loading) return;
      if (visibleCount >= filtered.length) return;
      loading = true;
      elLoading.hidden = false;

      const next = filtered.slice(visibleCount, visibleCount + PAGE_SIZE);
      for (const paper of next) {
        elList.appendChild(paperCard(paper));
      }
      visibleCount += next.length;
      elLoading.hidden = true;
      loading = false;
      updateMeta();
    }

    function applyFilter() {
      const instituteKeyword = normalize(elFilter.value);
      const titleKeyword = normalize(elTitleFilter.value);
      filtered = allPapers.filter((paper) => {
        const instituteMatch = normalize(paper.primary_institute).includes(instituteKeyword);
        const titleMatch = normalize(paper.title).includes(titleKeyword);
        return instituteMatch && titleMatch;
      });
      elList.innerHTML = "";
      visibleCount = 0;
      elEmpty.hidden = filtered.length !== 0;
      renderNextPage();
      updateMeta();
    }

    async function loadData() {
      const file = elConference.value;
      const response = await fetch(`./${file}`);
      if (!response.ok) throw new Error(`Failed to fetch data: ${response.status}`);
      allPapers = await response.json();
      allPapers.sort((a, b) => (b.avg_score || 0) - (a.avg_score || 0));
      applyFilter();
    }

    elFilter.addEventListener("input", applyFilter);
    elTitleFilter.addEventListener("input", applyFilter);
    elConference.addEventListener("change", () => {
      elList.innerHTML = "";
      elEmpty.hidden = true;
      elMeta.textContent = "Loading data...";
      loadData().catch((err) => {
        elMeta.textContent = `Error: ${err.message}`;
      });
    });
    const observer = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (entry.isIntersecting) {
          renderNextPage();
        }
      }
    }, { rootMargin: "200px" });
    observer.observe(sentinel);

    loadData().catch((err) => {
      elMeta.textContent = `Error: ${err.message}`;
    });
  </script>
</body>
</html>
